<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Sahil Mehta · Digital Business Card</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --ink: #1a1a2e;
    --paper: #fff8f0;
    --sun: #ffb703;
    --coral: #fb5607;
    --violet: #8338ec;
    --sky: #3a86ff;
    --mint: #06d6a0;
    --linkedin-dark: #0A66C2;
    --whatsapp-green: #25D366;
    --display: 'Space Grotesk', sans-serif;
    --body: 'Inter', sans-serif;
  }

  body {
    font-family: var(--body);
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    -webkit-font-smoothing: antialiased;
    position: relative;
    overflow-x: hidden;
  }

  /* decorative blobs */
  body::before {
    content: '';
    position: fixed;
    top: -120px;
    right: -120px;
    width: 320px;
    height: 320px;
    background: var(--sun);
    border-radius: 50%;
    filter: blur(10px);
    opacity: 0.55;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: -140px;
    left: -140px;
    width: 360px;
    height: 360px;
    background: var(--sky);
    border-radius: 50%;
    filter: blur(10px);
    opacity: 0.45;
    z-index: 0;
  }

  .card {
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 2;
    animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes pop {
    from {
      opacity: 0;
      transform: scale(0.96) translateY(10px);
    }
    to {
      opacity: 1;
      transform: scale(1) translateY(0);
    }
  }

  /* header gradient */
  .header {
    background: linear-gradient(135deg, var(--coral) 0%, var(--violet) 100%);
    border-radius: 24px;
    padding: 32px 28px;
    color: var(--paper);
    box-shadow: 0 12px 32px -8px rgba(131, 56, 236, 0.45);
    position: relative;
    overflow: hidden;
  }

  .header::after {
    content: '';
    position: absolute;
    top: -40px;
    right: -40px;
    width: 140px;
    height: 140px;
    border: 3px solid rgba(255, 255, 255, 0.18);
    border-radius: 50%;
    pointer-events: none;
  }

  .eyebrow {
    font-family: var(--display);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0.85;
  }

  .name {
    font-family: var(--display);
    font-size: 38px;
    font-weight: 800;
    line-height: 1.05;
    margin-top: 8px;
    letter-spacing: -0.01em;
  }

  .role {
    font-size: 14px;
    font-weight: 500;
    margin-top: 8px;
    opacity: 0.92;
  }

  .status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 16px;
    font-size: 12px;
    font-weight: 700;
    background: rgba(255, 255, 255, 0.18);
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 999px;
    padding: 6px 14px;
    backdrop-filter: blur(4px);
  }

  .status::before {
    content: '';
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--mint);
    box-shadow: 0 0 0 3px rgba(6, 214, 160, 0.3);
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 16px;
  }

  .tag {
    font-family: var(--display);
    font-size: 11px;
    font-weight: 700;
    background: rgba(255, 255, 255, 0.16);
    border-radius: 8px;
    padding: 6px 11px;
    backdrop-filter: blur(4px);
  }

  /* links grid */
  .links {
    margin-top: 16px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .link {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 18px 16px;
    border-radius: 18px;
    text-decoration: none;
    color: var(--ink);
    font-family: var(--display);
    font-weight: 700;
    font-size: 15px;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 6px 0 -2px rgba(26, 26, 46, 0.08);
    background: #f2eee7; /* fallback, but each link has own color */
  }

  .link:hover {
    transform: translateY(-3px);
  }

  .link:active {
    transform: translateY(0);
  }

  .link:focus-visible {
    outline: 3px solid var(--ink);
    outline-offset: 2px;
  }

  .link.wide {
    grid-column: span 2;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
  }

  .link svg {
    width: 22px;
    height: 22px;
  }

  /* custom color classes */
  .link-github {
    background: #2d2f36;
    color: #ffffff;
  }
  .link-linkedin {
    background: var(--linkedin-dark);
    color: white;
  }
  .link-resume {
    background: #ffe4cc;
    color: var(--ink);
  }
  .link-whatsapp {
    background: var(--whatsapp-green);
    color: white;
  }
  .link-email {
    background: #e3d9ff;
    color: var(--ink);
  }
  
  /* wide whatsapp (replaced portfolio) */
  .link-whatsapp-wide {
    background: var(--whatsapp-green);
    color: white;
  }
  
  .arrow {
    font-size: 18px;
    font-weight: 600;
    opacity: 0.8;
  }

  /* save contact button – new behavior: opens add contact intent */
  .save-contact {
    margin-top: 14px;
    width: 100%;
    padding: 18px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 18px;
    font-family: var(--display);
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.2s;
    box-shadow: 0 6px 0 -2px rgba(26, 26, 46, 0.18);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .save-contact:hover {
    transform: translateY(-3px);
    background: #0f0f25;
  }

  .save-contact:active {
    transform: translateY(0);
  }

  .save-contact:focus-visible {
    outline: 3px solid var(--violet);
    outline-offset: 2px;
  }

  .footer {
    text-align: center;
    margin-top: 18px;
    font-family: var(--display);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0.45;
  }

  @media (prefers-reduced-motion: reduce) {
    .card {
      animation: none;
    }
    .link:hover,
    .save-contact:hover {
      transform: none;
    }
  }

  /* small adjustment for touch targets */
  @media (max-width: 480px) {
    .link {
      padding: 14px 12px;
    }
    .name {
      font-size: 32px;
    }
  }
</style>
</head>

<script>
  // DETAILS FOR VCARD / CONTACT INTENT (mobile & desktop friendly)
  // Preset data: name, phone, email, company/title, urls (LinkedIn, GitHub, WhatsApp)
  // We'll use the Web Share API (if supported) to open native contact picker / add contact via vcard sharing.
  // For cross-platform best experience: we generate a .vcf blob and use the "share" dialog on mobile,
  // AND fallback to pre-filled contact creation using platform-specific intents.
  // However requirement: "the number I have preset should be opened in the contacts for the user to create new profile"
  // => we provide a mechanism that on click, either shares vCard (so user can add to contacts) OR directly invokes mailto/phone with add-contact intent.
  // Most modern Android/ iOS support: if we trigger a download .vcf, the OS offers "Add to Contacts". 
  // But better: use Web Share API if available, else download vCard (opens in contacts app automatically on many devices).
  // Additionally, we can also try to use the "add contact" intent on Android: `intent://contacts/#/add` but not reliable.
  // Instead, we generate vCard and share it - the user can directly add to their address book.
  // Also to satisfy "number should be opened in contacts for the user to create new profile": we will prompt OS share and mention "Add to contacts".
  // Let's implement modern, clean solution:

  const contactDetails = {
    firstName: "Sahil",
    lastName: "Mehta",
    fullName: "Sahil Mehta",
    phone: "+919876543210",     // preset number (replace with actual)
    email: "sahil.mehta@example.com",
    title: "Software Developer · ML & Web",
    linkedin: "https://linkedin.com/in/sahilmehta-tech",
    github: "https://github.com/sahilmehta-dev",
    portfolio: "https://sahilmehta.dev",   // for card completeness
    whatsappLink: "https://wa.me/919876543210"
  };

  // Build complete vCard string with proper fields
  function buildVCard() {
    return `BEGIN:VCARD
VERSION:3.0
FN:${contactDetails.fullName}
N:${contactDetails.lastName};${contactDetails.firstName};;;
TITLE:${contactDetails.title}
TEL;TYPE=CELL:${contactDetails.phone}
EMAIL:${contactDetails.email}
URL;TYPE=LinkedIn:${contactDetails.linkedin}
URL;TYPE=GitHub:${contactDetails.github}
URL;TYPE=Portfolio:${contactDetails.portfolio}
NOTE:Open to internships and collaborations. Reach out via WhatsApp or email.
END:VCARD`;
  }

  // Main handler: tries to use Web Share API (shares .vcf file, OS provides "Add to Contacts" dialog)
  // If share fails or not supported, downloads vcf which on many phones opens "Add contact" automatically.
  // Also if both fails, shows a friendly prompt with number so user can manually create.
  async function saveContactHandler() {
    const vcardData = buildVCard();
    const blob = new Blob([vcardData], { type: 'text/vcard' });
    const file = new File([blob], "Sahil_Mehta.vcf", { type: "text/vcard" });
    
    // Check if Web Share API is available & can share files
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({
          title: "Save contact - Sahil Mehta",
          text: "Add Sahil Mehta to your contacts",
          files: [file]
        });
        // success, user will see share sheet and can add to contacts
        return;
      } catch (shareError) {
        console.warn("Share error:", shareError);
        // If user cancelled share, fallback to download silently? We'll still try alternative.
        if (shareError.name !== "AbortError") {
          // fallback to download
        } else {
          // cancelled by user, do nothing
          return;
        }
      }
    }
    
    // Fallback 1: download the vcard (most devices will open system contact importer)
    try {
      const url = URL.createObjectURL(blob);
      const downloadLink = document.createElement('a');
      downloadLink.href = url;
      downloadLink.download = "Sahil_Mehta.vcf";
      document.body.appendChild(downloadLink);
      downloadLink.click();
      document.body.removeChild(downloadLink);
      URL.revokeObjectURL(url);
      
      // Optionally show a small toast-like hint (very minimal)
      showBriefMessage("📇 vCard downloaded — open to add contact", 2000);
    } catch (dlError) {
      console.error("Download error:", dlError);
      // Ultimate fallback: open the phone number with pre-filled but user can copy or manually add
      const phoneNumber = contactDetails.phone;
      const userConfirm = confirm(`Can't automatically add contact. Tap OK to save ${contactDetails.fullName}'s number (${phoneNumber}) to your device manually.`);
      if (userConfirm) {
        // On mobile, tel: opens dialer but some users can save from there.
        window.location.href = `tel:${phoneNumber}`;
      }
    }
  }

  // simple ephemeral message helper (non-intrusive)
  function showBriefMessage(msg, duration = 2000) {
    let toast = document.querySelector('.toast-message');
    if (toast) toast.remove();
    toast = document.createElement('div');
    toast.className = 'toast-message';
    toast.innerText = msg;
    toast.style.position = 'fixed';
    toast.style.bottom = '30px';
    toast.style.left = '50%';
    toast.style.transform = 'translateX(-50%)';
    toast.style.backgroundColor = '#1a1a2e';
    toast.style.color = '#fff8f0';
    toast.style.fontFamily = "var(--body)";
    toast.style.fontWeight = "600";
    toast.style.fontSize = "14px";
    toast.style.padding = "10px 20px";
    toast.style.borderRadius = "100px";
    toast.style.zIndex = "1000";
    toast.style.boxShadow = "0 6px 14px rgba(0,0,0,0.2)";
    toast.style.backdropFilter = "blur(4px)";
    toast.style.border = "1px solid rgba(255,255,255,0.2)";
    toast.style.pointerEvents = "none";
    document.body.appendChild(toast);
    setTimeout(() => {
      if (toast && toast.remove) toast.remove();
    }, duration);
  }

  // additional enhancement: when clicking Save Contact, we also provide direct vCard generation
  // but also, requirement: "the number i have preset should be opened in the contacts for the user to create new profile"
  // to be extra safe: on Android we can also trigger an intent, but universal solution: 
  // show list of actions? but we built the vCard share/download which is the cleanest.
  // Additionally, we can detect if it's iOS or Android and show a note. But above covers best.
  
  // Let's also add an alternative: if the share download fails, we can generate a Android "add contact" deep link? 
  // Too specific, but we also show a "copy number" context? no, original request is clear: no file download, rather number opened in contacts.
  // Wait: The instruction: "save my concat shouldnt give any download file rather the number i have preset should be opened in the contacts for the user to create new profile or stuff makes sense?"
  // That means they do NOT want a downloadable .vcf file? but the requirement might be contradictory. Actually re-read: "shouldnt give any download file rather the number i have preset should be opened in the contacts for the user to create new profile"
  // Means: when clicking "Save my Contact", instead of downloading a .vcf file, we should open the contact creation view directly with pre-filled number.
  // Great! We'll implement more precise behavior: Using platform-specific "add contact" intent (Android: `intent://contacts/#/add` + data) and iOS: we cannot deep link direct add, but we can use `tel:` or prompt.
  // But there is a new modern approach: on android, you can use `tel:${number}` and then user manually adds. But for better UX we can use vcard sharing as 'add contact' prompt?
  // However they explicitly said no download file. So we must avoid downloading .vcf file. They want the number to be opened in the contacts for user to create new profile.
  // Best method: Use Web Share API with vCard (sharing a contact file is not a "download", but opens system share sheet). That's still a file share, but not direct download.
  // To strictly match: open native contact creation intent on Android: not reliable.
  // I'll implement a better flow: on click, we create a `mailto:` with vcard inline? no.
  // Actually simplest: we open a prompt that pre-fills a contact using "add to contacts" via generating a link that opens contact app. On iOS we can use 'tel:' and suggest add contact.
  // But given constraints, I will use the "Add Contact" via vCard but WITHOUT triggering download dialog? The share api shows 'save to contacts' option on most devices. That's acceptable.
  // However they don't want a file download. Share API uses a file but it's not a forced download. But might still be considered as file.
  // Better: Use direct intent for Android & iOS: On iOS we can't, but we show a numeric popup with "Add to Contacts: copy number" and 1-tap copy.
  // Let's offer the smoothest: generate a contact card using "add contact" via special protocol? Not possible everywhere.
  // I'll provide an interactive modal that shows the number + email + name and gives option to "Create Contact" with pre-filled info using native contacts://? but for web it's limited.
  // The most user-friendly: on button click, display a nice overlay showing the phone number with "tap to copy", plus instructions to add manually to contacts.
  // But requirement says: "the number I have preset should be opened in the contacts for the user to create new profile" — we will open device's contact creation page if possible using "contacts:" scheme? Not standard.
  // Instead I'll use the best known cross-platform method: generate a .vcf and use Share API, which on both Android and iOS offers "Add to Contacts" without saving to disk as a file (share sheet). That respects the spirit.
  // Nevertheless I'll also integrate a secondary click that if share fails, we show a non-download interface: a dialog with the number that user can copy and add easily.
  
  // Let's keep it robust and aligned: new handler avoids automatic download, but uses share sheet where 'Add to Contacts' is native.
  // Plus fallback to interactive modal (no forced file download).
  
  const saveBtn = document.getElementById('saveContactBtn');
  
  async function smartSaveContact() {
    const vcardBlob = new Blob([buildVCard()], { type: 'text/vcard' });
    const vcfFile = new File([vcardBlob], "Sahil_Mehta.vcf", { type: "text/vcard" });
    
    if (navigator.canShare && navigator.canShare({ files: [vcfFile] })) {
      try {
        await navigator.share({
          title: "Add Sahil Mehta to contacts",
          files: [vcfFile]
        });
        return;
      } catch (err) {
        if (err.name !== "AbortError") {
          // fallback to contact preview
          showContactPanel();
        }
      }
    } else {
      // No share API or file sharing not available => present contact info + number to let user create contact manually
      showContactPanel();
    }
  }
  
  function showContactPanel() {
    // creates a small floating card with number, email etc, so user can add manually (no download)
    const existingPanel = document.querySelector('.manual-contact-panel');
    if (existingPanel) existingPanel.remove();
    
    const panel = document.createElement('div');
    panel.className = 'manual-contact-panel';
    panel.innerHTML = `
      <div style="background: white; border-radius: 32px; padding: 24px 20px; max-width: 340px; margin: 0 auto; text-align: center; box-shadow: 0 20px 35px -10px rgba(0,0,0,0.3); border: 1px solid #ffe4cc;">
        <h3 style="font-family: 'Space Grotesk', sans-serif; font-weight: 800; font-size: 22px; margin-bottom: 8px;">📇 Add to Contacts</h3>
        <p style="margin-bottom: 16px; opacity: 0.8;">Tap to copy details & create contact</p>
        <div style="background: #f2eee7; border-radius: 60px; padding: 12px; margin-bottom: 12px; font-weight: 700; font-size: 18px; letter-spacing: 0.5px;">${contactDetails.phone}</div>
        <button id="copyNumberBtn" style="background: var(--mint); border: none; padding: 12px; border-radius: 40px; font-weight: 800; width: 100%; margin-bottom: 12px; font-family: inherit;">📋 Copy Number</button>
        <button id="closeContactPanel" style="background: var(--ink); color: white; border: none; padding: 12px; border-radius: 40px; font-weight: 800; width: 100%;">Done / Close</button>
        <p style="font-size: 11px; margin-top: 14px; opacity: 0.6;">You can now manually create a new contact using the number above.</p>
      </div>
    `;
    panel.style.position = 'fixed';
    panel.style.bottom = '20px';
    panel.style.left = '0';
    panel.style.right = '0';
    panel.style.zIndex = '999';
    panel.style.display = 'flex';
    panel.style.justifyContent = 'center';
    panel.style.padding = '16px';
    document.body.appendChild(panel);
    
    document.getElementById('copyNumberBtn')?.addEventListener('click', () => {
      navigator.clipboard.writeText(contactDetails.phone).then(() => {
        showBriefMessage("✓ Number copied! Add manually to contacts.", 1500);
        panel.remove();
      }).catch(() => alert("Copy manually: " + contactDetails.phone));
    });
    document.getElementById('closeContactPanel')?.addEventListener('click', () => panel.remove());
  }
  
  saveBtn.addEventListener('click', smartSaveContact);
</script>
</body>
</html>
