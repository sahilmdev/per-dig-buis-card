<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sahil Mehta</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e;
    --paper: #fff8f0;
    --sun: #ffb703;
    --coral: #fb5607;
    --violet: #8338ec;
    --sky: #3a86ff;
    --mint: #06d6a0;
    --display: 'Space Grotesk', sans-serif;
    --body: 'Inter', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--body);
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    -webkit-font-smoothing: antialiased;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -120px;
    right: -120px;
    width: 320px;
    height: 320px;
    background: var(--sun);
    border-radius: 50%;
    filter: blur(10px);
    opacity: 0.55;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: -140px;
    left: -140px;
    width: 360px;
    height: 360px;
    background: var(--sky);
    border-radius: 50%;
    filter: blur(10px);
    opacity: 0.45;
    z-index: 0;
  }

  .card {
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
    animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes pop {
    from { opacity: 0; transform: scale(0.96) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .header {
    background: linear-gradient(135deg, var(--coral) 0%, var(--violet) 100%);
    border-radius: 24px;
    padding: 32px 28px;
    color: var(--paper);
    box-shadow: 0 12px 32px -8px rgba(131, 56, 236, 0.45);
    position: relative;
    overflow: hidden;
  }

  .header::after {
    content: '';
    position: absolute;
    top: -40px;
    right: -40px;
    width: 140px;
    height: 140px;
    border: 3px solid rgba(255,255,255,0.18);
    border-radius: 50%;
  }

  .eyebrow {
    font-family: var(--display);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0.85;
  }

  .name {
    font-family: var(--display);
    font-size: 38px;
    font-weight: 800;
    line-height: 1.05;
    margin-top: 8px;
    letter-spacing: -0.01em;
  }

  .role {
    font-size: 14px;
    font-weight: 500;
    margin-top: 8px;
    opacity: 0.92;
  }

  .status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 16px;
    font-size: 12px;
    font-weight: 700;
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 999px;
    padding: 6px 14px;
    backdrop-filter: blur(4px);
  }

  .status::before {
    content: '';
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--mint);
    box-shadow: 0 0 0 3px rgba(6, 214, 160, 0.3);
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 16px;
  }

  .tag {
    font-family: var(--display);
    font-size: 11px;
    font-weight: 700;
    background: rgba(255,255,255,0.16);
    border-radius: 8px;
    padding: 6px 11px;
    backdrop-filter: blur(4px);
  }

  .links {
    margin-top: 16px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .link {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 18px 16px;
    border-radius: 18px;
    text-decoration: none;
    color: var(--ink);
    font-family: var(--display);
    font-weight: 700;
    font-size: 15px;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 6px 0 -2px rgba(26,26,46,0.08);
  }

  .link:hover { transform: translateY(-3px); }
  .link:active { transform: translateY(0); }

  .link:focus-visible {
    outline: 3px solid var(--ink);
    outline-offset: 2px;
  }

  .link.wide { grid-column: span 2; flex-direction: row; align-items: center; justify-content: space-between; }

  .link svg { width: 22px; height: 22px; }

  .link-1 { background: var(--sun); }
  .link-2 { background: #0077b5; color: #ffffff; }
  .link-2 .arrow { color: #ffffff; }
  .link-3 { background: #ffd6e8; } /* Email block style */
  .link-4 { background: var(--mint); } /* WhatsApp block style */

  .link .arrow {
    font-size: 18px;
  }

  .action-btn {
    margin-top: 14px;
    width: 100%;
    padding: 18px;
    border: none;
    border-radius: 18px;
    font-family: var(--display);
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: transform 0.15s ease;
    box-shadow: 0 6px 0 -2px rgba(26,26,46,0.18);
    display: block;
    text-align: center;
    text-decoration: none;
  }

  .save-contact { background: var(--ink); color: var(--paper); }
  .resume-btn { background: var(--violet); color: var(--paper); }

  .action-btn:hover { transform: translateY(-3px); }
  .action-btn:active { transform: translateY(0); }
  .action-btn:focus-visible { outline: 3px solid var(--violet); outline-offset: 2px; }

  .footer {
    text-align: center;
    margin-top: 18px;
    font-family: var(--display);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0.4;
  }

  @media (prefers-reduced-motion: reduce) {
    .card { animation: none; }
    .action-btn:hover, .link:hover { transform: none; }
  }
</style>
</head>
